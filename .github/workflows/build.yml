name: Build SEP Timeout Dylib
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build dylib (arm64 + arm64e)
        run: |
          ls -la
          SDK=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null)
          if [ -z "$SDK" ]; then
            SDK=$(xcrun --sdk macosx --show-sdk-path 2>/dev/null)
            TARGET="-mmacosx-version-min=11.0"
          else
            TARGET="-miphoneos-version-min=14.0"
          fi
          echo "SDK: $SDK"
          xcrun clang -arch arm64 -arch arm64e \
            -isysroot "$SDK" $TARGET \
            -dynamiclib -o sep_timeout.dylib \
            vcam_sep_timeout.c
          file sep_timeout.dylib
          ls -la sep_timeout.dylib

      - uses: actions/upload-artifact@v4
        with:
          name: sep_timeout.dylib
          path: sep_timeout.dylib
