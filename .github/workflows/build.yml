name: Build SEP Timeout Dylib
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build dylib (arm64 + arm64e)
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path 2>/dev/null)
          if [ -z "$SDK" ]; then
            SDK=$(xcrun --sdk macosx --show-sdk-path 2>/dev/null)
            TARGET="-mmacosx-version-min=11.0"
          else
            TARGET="-miphoneos-version-min=14.0"
          fi
          xcrun clang -arch arm64 -arch arm64e \
            -isysroot "$SDK" $TARGET \
            -dynamiclib -o vcam_sep_timeout.dylib \
            vcam_sep_timeout.c fishhook.c
          file vcam_sep_timeout.dylib
          ls -la vcam_sep_timeout.dylib
          mkdir -p built
          cp vcam_sep_timeout.dylib vcam_sep_timeout.plist built/

      - name: Commit built artifacts
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add built/
          git commit -m "Build vcam_sep_timeout.dylib [skip ci]" || echo "no changes"
          git push
