name: Build SEP Timeout Dylib
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install ldid
        run: brew install ldid

      - name: Build dylib (arm64 + arm64e)
        run: |
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          xcrun clang -arch arm64 -arch arm64e \
            -isysroot "$SDK" \
            -miphoneos-version-min=14.0 \
            -dynamiclib -o sep_timeout.dylib \
            vcam_sep_timeout.c
          file sep_timeout.dylib
          ldid -S sep_timeout.dylib
          ls -la sep_timeout.dylib

      - uses: actions/upload-artifact@v4
        with:
          name: sep_timeout.dylib
          path: sep_timeout.dylib
